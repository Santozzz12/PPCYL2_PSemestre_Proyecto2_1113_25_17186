<!DOCTYPE html>
<html>

<head>
    <title>IPC2-AcadNet | Admin</title>
</head>

<body style="font-family: Arial; display: flex;">
    <div style="width: 200px; border-right: 1px solid black; padding: 20px;">
        <h2>👤 Admin</h2>
        <hr>
        <p>⬆️ Cargar Archivo</p>
        <p>👥 Ver Usuarios</p>
        <p>ℹ️ Información</p>
    </div>
    <div style="padding: 30px; width: 100%;">
        <h2>CARGA DE ARCHIVOS</h2>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="file" name="archivo_xml">
            <button type="submit" name="btn_cargar">Cargar Archivo</button>
            <button type="submit" name="btn_procesar">Procesar Datos</button>
            <button type="submit" name="btn_limpiar">Limpiar Datos</button>
            <br><br>
            <textarea name="texto_xml" style="width: 100%; height: 150px;">{{ xml_entrada }}</textarea>
        </form>
        <h2>SALIDA</h2>
        <textarea readonly style="width: 100%; height: 150px;">{{ xml_salida }}</textarea>
    </div>
</body>

</html>
